<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretty Face Filter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #050505;
      background:
        radial-gradient(circle at 18% 36%, rgba(126, 159, 203, 0.28) 0 2px, transparent 3px),
        radial-gradient(circle at 42% 54%, rgba(255, 255, 255, 0.9) 0 9%, transparent 18%),
        radial-gradient(circle at 16% 80%, rgba(255, 255, 255, 0.78) 0 13%, transparent 24%),
        radial-gradient(circle at 86% 18%, rgba(255, 255, 255, 0.82) 0 13%, transparent 24%),
        radial-gradient(circle at 82% 82%, rgba(255, 255, 255, 0.86) 0 17%, transparent 30%),
        linear-gradient(112deg, #c8d9f1 0%, #d7e5f7 42%, #eff6ff 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.23;
      background-image:
        repeating-radial-gradient(circle at 0 0, rgba(28, 48, 77, 0.08) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(92deg, rgba(255, 255, 255, 0.14) 0 1px, transparent 1px 4px);
      mix-blend-mode: multiply;
    }

    .landing {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(340px, 0.95fr) minmax(360px, 1.05fr);
      align-items: center;
      gap: 36px;
      padding: clamp(36px, 7vw, 116px);
    }

    .intro {
      position: relative;
      z-index: 2;
      text-align: center;
      justify-self: center;
      width: min(670px, 100%);
      padding-top: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(78px, 10vw, 150px);
      font-weight: 700;
      line-height: 0.86;
      letter-spacing: 0;
      text-align: left;
    }

    .pretty-mark {
      display: inline-block;
      margin: 28px auto 0;
      padding: 0 42px 6px;
      background: #ffe948;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(82px, 9vw, 145px);
      font-style: italic;
      font-weight: 400;
      line-height: 0.92;
      transform: translateX(12px);
    }

    .tagline {
      margin: 56px auto 0;
      max-width: 460px;
      font-size: clamp(22px, 2vw, 32px);
      line-height: 1.35;
    }

    .tagline strong {
      font-weight: 800;
    }

    .ready-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 260px;
      min-height: 54px;
      margin-top: 50px;
      padding: 10px 34px;
      border: 2px solid #050505;
      border-radius: 999px;
      background: rgba(245, 245, 245, 0.92);
      color: #050505;
      text-decoration: none;
      font-size: 26px;
      line-height: 1;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .ready-link:hover,
    .ready-link:focus-visible {
      background: #fff;
      box-shadow: 0 9px 24px rgba(47, 63, 94, 0.18);
      transform: translateY(-2px);
      outline: none;
    }

    .cloud-stage {
      position: relative;
      z-index: 1;
      justify-self: center;
      width: min(640px, 45vw);
      aspect-ratio: 1.18;
      min-width: 360px;
    }

    .contour {
      position: absolute;
      inset: 2% 0 0 0;
      border: 5px solid rgba(255, 255, 255, 0.92);
      border-radius: 46% 54% 47% 53% / 46% 39% 61% 54%;
      transform: rotate(-8deg);
    }

    .contour:nth-child(1) {
      inset: 1% -4% -2% 3%;
    }

    .contour:nth-child(2) {
      inset: 7% 4% 4% 8%;
    }

    .contour:nth-child(3) {
      inset: 13% 12% 12% 14%;
    }

    .contour:nth-child(4) {
      inset: 20% 21% 21% 22%;
    }

    .contour:nth-child(5) {
      inset: 28% 31% 30% 32%;
    }

    .cloud {
      position: absolute;
      left: 5%;
      right: 4%;
      bottom: 15%;
      height: 62%;
      filter: drop-shadow(0 30px 20px rgba(104, 118, 148, 0.28));
    }

    .cloud span {
      position: absolute;
      display: block;
      background: linear-gradient(145deg, #edf2fb 0%, #d3dbea 100%);
      border-radius: 50%;
      box-shadow: inset 18px 16px 34px rgba(255, 255, 255, 0.5);
    }

    .puff-main {
      width: 53%;
      height: 92%;
      left: 28%;
      bottom: 2%;
    }

    .puff-left {
      width: 37%;
      height: 57%;
      left: 4%;
      bottom: 7%;
    }

    .puff-right {
      width: 38%;
      height: 55%;
      right: 0;
      bottom: 11%;
    }

    .puff-top {
      width: 42%;
      height: 66%;
      left: 31%;
      top: 0;
    }

    .puff-base {
      width: 76%;
      height: 33%;
      left: 12%;
      bottom: 0;
      border-radius: 999px;
    }

    .face {
      position: absolute;
      left: 52%;
      top: 48%;
      width: 132px;
      height: 82px;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .eye {
      position: absolute;
      top: 0;
      width: 48px;
      height: 58px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 55% 34%, #ffffff 0 5px, transparent 6px),
        radial-gradient(circle at 46% 48%, #1d1d1d 0 17px, #303030 18px 23px, transparent 24px),
        radial-gradient(circle at 50% 50%, #ffffff 0 29px, #b6b8be 31px 36px, transparent 37px);
      box-shadow: inset -4px -6px 8px rgba(0, 0, 0, 0.18), 0 2px 4px rgba(0, 0, 0, 0.16);
    }

    .eye.left {
      left: 10px;
    }

    .eye.right {
      right: 10px;
    }

    .mouth {
      position: absolute;
      left: 50%;
      bottom: 1px;
      width: 98px;
      height: 38px;
      border-radius: 999px;
      transform: translateX(-50%);
      background:
        radial-gradient(ellipse at 50% 38%, rgba(255, 130, 130, 0.9) 0 38%, transparent 39%),
        linear-gradient(#ff4940 0%, #d31623 68%, #8f0715 100%);
      border: 4px solid #9e0716;
      box-shadow: inset 0 -7px 6px rgba(78, 0, 13, 0.26), 0 5px 5px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 900px) {
      .landing {
        grid-template-columns: 1fr;
        align-content: center;
        padding: 42px 24px 56px;
      }

      .intro {
        order: 2;
        padding-top: 0;
      }

      h1 {
        text-align: center;
      }

      .pretty-mark {
        transform: none;
        padding-inline: 26px;
      }

      .tagline {
        margin-top: 34px;
      }

      .ready-link {
        margin-top: 32px;
      }

      .cloud-stage {
        order: 1;
        width: min(520px, 88vw);
        min-width: 0;
      }
    }

    @media (max-width: 520px) {
      .landing {
        padding-inline: 18px;
      }

      .pretty-mark {
        width: 100%;
        padding-inline: 10px;
      }

      .ready-link {
        width: min(260px, 82vw);
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="landing" aria-label="Pretty face filter welcome page">
    <section class="intro">
      <h1>hi there,</h1>
      <div class="pretty-mark">pretty!</div>
      <p class="tagline">are you ready to slay, serve &amp;<br><strong>yassify</strong> yourself? ☺</p>
      <a class="ready-link" href="frapp.html">i'm ready</a>
    </section>

    <section class="cloud-stage" aria-hidden="true">
      <div class="contour"></div>
      <div class="contour"></div>
      <div class="contour"></div>
      <div class="contour"></div>
      <div class="contour"></div>
      <div class="cloud">
        <span class="puff-main"></span>
        <span class="puff-left"></span>
        <span class="puff-right"></span>
        <span class="puff-top"></span>
        <span class="puff-base"></span>
        <div class="face">
          <span class="eye left"></span>
          <span class="eye right"></span>
          <span class="mouth"></span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
